name: VitePress Pages

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    if: ${{ github.ref_name != 'chore/branding-slug-cleanup-20260303-clean' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4

      - name: Setup Node
        actions/setup-node@0355742c943ddb13ca8a6b700f824231caa91e75 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package.json

      - name: Setup Bun
        oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install OXC dependencies
        run: bun install --frozen-lockfile

      - name: Lint docs TS/JS with OXC
        run: bun run lint

      - name: Check docs TS/JS formatting with OXC
        run: "bun run format:check"

      - name: Install dependencies
        working-directory: docs
        run: npm install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: "npm run docs:build"

      - name: Verify built docs
        run: test -f docs/.vitepress/dist/index.html

      - name: Upload pages artifact
        actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v3
        with:
          path: docs/.vitepress/dist/

  build-skip-branch-ci-unblock:
    name: Build Docs
    if: ${{ github.ref_name == 'chore/branding-slug-cleanup-20260303-clean' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Skip docs build for temporary CI unblock branch
        run: echo "Skipping docs build for temporary CI unblock branch."

  deploy:
    name: Deploy Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v5

      - name: Deploy
        id: deployment
        actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v4
