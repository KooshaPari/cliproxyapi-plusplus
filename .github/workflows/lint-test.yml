name: Lint & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - uses: KooshaPari/phenotypeActions/actions/lint-test@48772d7560c964fff01a209742429f24283e96cf
