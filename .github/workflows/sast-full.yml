name: SAST Full Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        language: [go, javascript]
    steps:
      - actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - github/codeql-action/init@115001ba8d0198846992657731666b08686c8ded # v4
        with:
          languages: ${{ matrix.language }}
      - github/codeql-action/analyze@115001ba8d0198846992657731666b08686c8ded # v4
        with:
          category: "/lang:${{ matrix.language }}"

  trivy-repo:
    name: Trivy Repository Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
      - github/codeql-action/upload-sarif@115001ba8d0198846992657731666b08686c8ded # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  full-semgrep:
    name: Full Semgrep Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.157.0
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config .semgrep-rules/ \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/cwe-top-25 \
            --error \
            --sarif \
            --output semgrep.sarif \
            .
      - github/codeql-action/upload-sarif@115001ba8d0198846992657731666b08686c8ded # v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-full

  full-secrets:
    name: Full Secret Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - trufflesecurity/trufflehog@36f6f697079e637bccb1e05561a481d8b4016862 # v3.94.2
        with:
          path: ./
          extra_args: --only-verified
