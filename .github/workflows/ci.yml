name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  push:
    branches: [main, feature/*, bugfix/*, docs/*, release/*, hotfix/*]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    
    strategy:
      matrix:
        go-version: ['1.21', '1.22']
    
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
      - name: Refresh models catalog
      - run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          mkdir -p pkg/llmproxy/registry/models
          git show FETCH_HEAD:models.json > pkg/llmproxy/registry/models/models.json

      - name: Setup Go
        uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@ca0a928a4cb3911011e868128a5cd90437c12db1 # v3
        with:
          files: ./coverage.out
      

  phenotype-validate:
    runs-on: ubuntu-24.04
    uses: KooshaPari/phenotypeActions/.github/workflows/validate-governance.yml@48772d7560c964fff01a209742429f24283e96cf
