name: Security Guard (Hooks)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0

      - name: Wire Git hook path and verify guard hook
        run: |
          git config core.hooksPath .github/hooks
          test -f .github/hooks/pre-commit
          test -x .github/hooks/pre-commit
          test -f .github/hooks/security-guard.sh
          test -x .github/hooks/security-guard.sh

      - name: Run security guard hook
        run: |
          .github/hooks/pre-commit
