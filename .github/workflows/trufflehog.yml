name: Trufflehog Secrets Scan
permissions:
  contents: read
  pull-requests: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290
        with:
          go-version: 'stable'
      - run: go install github.com/trufflehog/trufflehog/v3@latest
      - run: trufflehog github --only-verified --no-update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
