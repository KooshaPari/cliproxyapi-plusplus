name: release-batch

on:
  workflow_dispatch:
permissions:
  contents: write

concurrency:
  group: release-batch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - name: Setup Go
        uses: actions/setup-go@78961f6f84d799cd858575bb931c3e51d3b13290 # v5
        with:
          go-version: ">=1.26.0"
          cache: true
      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Create and publish next batch release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./cmd/releasebatch --mode create --target main
