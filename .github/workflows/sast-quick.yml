name: SAST Quick Check
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Tier 3: Advisory - security enrichment only
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48 # v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.157.0
      - name: Run Semgrep
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          semgrep scan --sarif --sarif-output=semgrep.sarif --max-target-bytes 1000000 --quiet --config=auto || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@115001ba8d0198846992657731666b08686c8ded # v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  # License Compliance - Tier 3: Advisory
  license-compliance:
    name: License Compliance
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Tier 3: Advisory - security enrichment only
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
      - name: Analyze licenses
        uses: fsfe/reuse-action@6ac5c823270d369f01e3c491c708f706f2bdc355 # v4
        continue-on-error: true  # Allow findings but don't fail
      - name: Check for non-reusable licenses
        run: |
          # Check for problematic licenses
          grep -r "GPL\|AGPL" --include="*.toml" --include="*.json" . || true
      - name: Check license compliance
        uses: fsfe/reuse-action@6ac5c823270d369f01e3c491c708f706f2bdc355 # v4
        continue-on-error: true

  # Secret Scanning - Tier 2: Important (runs in parallel)
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --redact
      - name: Run Trivy Secret Scanner
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # master
        with:
          scan-type: repo
          exit-code: 0
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@115001ba8d0198846992657731666b08686c8ded # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
