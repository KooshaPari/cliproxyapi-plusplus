name: SAST Quick Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.157.0
      - name: Run Semgrep
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "$PR_BASE_REF"
            mapfile -t changed_files < <(
              git diff --name-only --diff-filter=ACMR "origin/$PR_BASE_REF...$HEAD_SHA" -- \
                '*.go' '*.yaml' '*.yml' '*.sh' '*.json' '*.ts' '*.tsx' '*.js' '*.jsx'
            )
            if [ "${#changed_files[@]}" -eq 0 ]; then
              cat > semgrep.sarif <<'EOF'
          {"version":"2.1.0","runs":[]}
          EOF
              exit 0
            fi
            semgrep scan \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --config p/cwe-top-25 \
              --error \
              --sarif \
              --output semgrep.sarif \
              "${changed_files[@]}"
          else
            semgrep scan \
              --config p/security-audit \
              --config p/owasp-top-ten \
              --config p/cwe-top-25 \
              --error \
              --sarif \
              --output semgrep.sarif \
              .
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          extra_args: --only-verified

  go-quality:
    name: Go Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Enforce gofmt
        run: |
          files=$(git ls-files '*.go')
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture dependency inventory
        run: |
          go list -m -f '{{if not .Main}}{{.Path}} {{.Version}}{{end}}' all | sort > license-inventory.txt
          test -s license-inventory.txt
