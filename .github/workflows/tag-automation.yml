name: Tag Automation
on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231 # v4
      - name: Create release tag
        run: echo "Creating release for ${{ github.ref_name }}"
